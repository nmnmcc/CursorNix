name: Update Cursor

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: update-cursor
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update pinned upstream assets
        run: python3 update.py

      - name: Check flake
        run: nix flake check -L

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- sources.json flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          cursor_version="$(jq -r '.cursor.version' sources.json)"
          agent_version="$(jq -r '.agent.version' sources.json)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sources.json flake.lock
          git commit -m "Update Cursor ${cursor_version} and agent ${agent_version}"
          git pull --rebase origin "${{ github.event.repository.default_branch }}"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
